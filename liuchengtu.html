<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>成人 ADHD 诊疗流程图</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      background: transparent;
      overflow: visible;
    }

    body {
      min-height: auto;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px 8px 0;
      color: #314360;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    }

    .flow-container {
      position: relative;
      width: 100%;
      max-width: 1000px;
      padding-bottom: 10px;
    }

    .flow-container::before {
      content: "";
      position: absolute;
      inset: 12% 8% 20%;
      background:
        radial-gradient(circle at 24% 46%, rgba(232, 211, 255, 0.24), transparent 24%),
        radial-gradient(circle at 72% 42%, rgba(222, 236, 255, 0.28), transparent 28%);
      filter: blur(28px);
      opacity: 0.88;
      pointer-events: none;
    }

    .flow-steps {
      position: relative;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
      align-items: start;
    }

    .flow-steps::before {
      content: "";
      position: absolute;
      left: 7%;
      right: 7%;
      top: 36px;
      height: 2px;
      background: linear-gradient(90deg, rgba(207, 180, 244, 0.52), rgba(168, 200, 241, 0.46));
      z-index: 0;
    }

    .step {
      position: relative;
      z-index: 1;
      border-radius: 20px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.34);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.34);
      backdrop-filter: blur(8px);
    }

    .step-header {
      position: relative;
      padding: 14px 14px 12px;
      font-size: 1rem;
      font-weight: 700;
      text-align: center;
      color: #2e405e;
    }

    .step-header::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -10px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.22);
    }

    .step-content {
      padding: 16px 15px 18px;
      border-top: 1px solid rgba(117, 137, 170, 0.1);
    }

    .step-item {
      position: relative;
      padding: 7px 0 7px 18px;
      font-size: 0.88rem;
      line-height: 1.55;
      color: #50617b;
    }

    .step-item::before {
      content: "";
      position: absolute;
      left: 0;
      top: 14px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(168, 200, 241, 0.9);
    }

    .step-item-details {
      color: #73829a;
      font-size: 0.8rem;
      margin-top: 4px;
    }

    .step-1 .step-header { background: rgba(232, 211, 255, 0.88); }
    .step-2 .step-header { background: rgba(214, 225, 255, 0.9); }
    .step-3 .step-header { background: rgba(222, 236, 255, 0.92); }
    .step-4 .step-header { background: rgba(198, 207, 255, 0.84); }
    .step-5 .step-header { background: rgba(176, 208, 255, 0.84); }

    .flow-notes {
      margin-top: 18px;
      text-align: center;
      color: #7b8a9f;
      font-size: 0.84rem;
      line-height: 1.6;
    }

    @media (max-width: 860px) {
      body {
        padding-inline: 0;
      }

      .flow-steps {
        grid-template-columns: 1fr;
      }

      .flow-steps::before {
        display: none;
      }

      .step-header::after {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="flow-container">
    <div class="flow-steps">
      <div class="step step-1">
        <div class="step-header">病史采集</div>
        <div class="step-content">
          <div class="step-item">儿童/成年期</div>
          <div class="step-item">症状确定(ADHD/共病)</div>
          <div class="step-item">病程确定</div>
          <div class="step-item">功能损害<div class="step-item-details">学习、个人生活、家庭、职业功能</div></div>
          <div class="step-item">个人史/既往史/家族史</div>
        </div>
      </div>

      <div class="step step-2">
        <div class="step-header">心理测评</div>
        <div class="step-content">
          <div class="step-item">ADHD症状评定量表</div>
          <div class="step-item">执行功能评估</div>
          <div class="step-item">常见共病症状评估</div>
        </div>
      </div>

      <div class="step step-3">
        <div class="step-header">常规与辅助检查</div>
        <div class="step-content">
          <div class="step-item">体格检查</div>
          <div class="step-item">实验室检查</div>
          <div class="step-item">脑电图和神经影像<div class="step-item-details">(必要时)</div></div>
        </div>
      </div>

      <div class="step step-4">
        <div class="step-header">诊断</div>
        <div class="step-content">
          <div class="step-item">ICD-11诊断标准</div>
          <div class="step-item">鉴别诊断</div>
          <div class="step-item">ADHD分类诊断</div>
          <div class="step-item">共病诊断</div>
          <div class="step-item">诊断性访谈工具<div class="step-item-details">(必要时)</div></div>
        </div>
      </div>

      <div class="step step-5">
        <div class="step-header">综合治疗和随访监测</div>
        <div class="step-content">
          <div class="step-item">药物治疗</div>
          <div class="step-item">非药物治疗</div>
          <div class="step-item">随访和监测</div>
          <div class="step-item">转诊<div class="step-item-details">(必要时)</div></div>
        </div>
      </div>
    </div>

    <div class="flow-notes">注：ADHD为注意缺陷多动障碍；ICD-11为国际疾病分类第11版</div>
  </div>

  <script>
    function getContentHeight() {
      const root = document.querySelector(".flow-container");
      if (!root) {
        return 640;
      }

      const styles = window.getComputedStyle(root);
      const marginTop = parseFloat(styles.marginTop) || 0;
      const marginBottom = parseFloat(styles.marginBottom) || 0;
      const rectHeight = root.getBoundingClientRect().height || 0;
      return Math.ceil(Math.max(root.scrollHeight, root.offsetHeight, rectHeight) + marginTop + marginBottom);
    }

    function syncParentHeight() {
      const height = Math.max(getContentHeight(), 640);

      if (window.frameElement) {
        window.frameElement.style.height = `${height + 28}px`;
      }

      try {
        if (window.parent && window.parent.document) {
          const parentFrame = [...window.parent.document.querySelectorAll("iframe.auto-iframe")]
            .find((item) => (item.getAttribute("src") || "").includes("liuchengtu.html"));
          if (parentFrame) {
            parentFrame.style.height = `${height + 28}px`;
          }
        }
      } catch (error) {
        // ignore parent access issues
      }

      if (window.parent) {
        window.parent.postMessage({
          type: "iframe-height",
          source: "liuchengtu.html",
          height
        }, "*");
      }
    }

    window.addEventListener("load", () => {
      syncParentHeight();
      setTimeout(syncParentHeight, 120);
      setTimeout(syncParentHeight, 420);
      setTimeout(syncParentHeight, 900);
    });

    window.addEventListener("resize", syncParentHeight);

    if ("ResizeObserver" in window) {
      const observer = new ResizeObserver(() => syncParentHeight());
      const root = document.querySelector(".flow-container");
      if (root) {
        observer.observe(root);
      }
    }
  </script>
</body>
</html>
