<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>成人 ADHD 自评</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      overflow: visible;
      min-height: auto;
    }

    body {
      background: transparent;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: #314360;
      padding: 0;
    }

    .container {
      position: relative;
      max-width: 760px;
      margin: 10px auto 0;
      padding: 18px 18px 28px;
    }

    .container::before {
      content: "";
      position: absolute;
      inset: 12% 8% 10%;
      background:
        radial-gradient(circle at 26% 36%, rgba(232, 211, 255, 0.22), transparent 24%),
        radial-gradient(circle at 74% 62%, rgba(222, 236, 255, 0.26), transparent 28%);
      filter: blur(30px);
      opacity: 0.86;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      overflow: visible;
    }

    h1 {
      color: #2e405e;
      font-size: 1.9rem;
      line-height: 1.3;
      margin-bottom: 16px;
      padding-left: 16px;
      position: relative;
    }

    h1::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.16em;
      width: 7px;
      height: 1.12em;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(207, 180, 244, 0.96), rgba(168, 200, 241, 0.96));
    }

    .desc {
      color: #566782;
      line-height: 1.85;
      padding: 0 0 8px;
      margin-bottom: 18px;
    }

    .start-btn,
    .submit-btn {
      border: 0;
      border-radius: 999px;
      padding: 13px 22px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
      background: linear-gradient(90deg, rgba(222, 236, 255, 0.96), rgba(232, 211, 255, 0.92));
      color: #314360;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.4);
    }

    .start-btn:hover,
    .submit-btn:hover {
      transform: translateY(-1px);
      background: linear-gradient(90deg, rgba(232, 211, 255, 0.96), rgba(222, 236, 255, 0.94));
    }

    .submit-btn {
      width: 100%;
      margin-top: 28px;
    }

    .form-shell {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }

    .form-shell.is-hidden {
      display: none;
    }

    .form-shell.is-visible {
      opacity: 1;
      transform: none;
    }

    .section-title {
      display: inline-block;
      margin: 26px 0 12px;
      padding: 7px 14px;
      border-radius: 999px;
      font-size: 0.94rem;
      color: #44556f;
      background: rgba(255, 255, 255, 0.54);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.52);
    }

    .question {
      margin-bottom: 12px;
      padding: 16px 16px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.38);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.36);
    }

    .question-title {
      margin-bottom: 10px;
      font-weight: 700;
      line-height: 1.6;
      color: #314360;
    }

    .options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .options label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(222, 236, 255, 0.78);
      color: #51627c;
      cursor: pointer;
      font-size: 0.92rem;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .options label:hover {
      transform: translateY(-1px);
      background: rgba(232, 211, 255, 0.82);
    }

    .options input[type="radio"] {
      accent-color: #9ebee8;
    }

    .result {
      display: none;
      margin-top: 22px;
      padding: 18px 18px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.48);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.42);
      line-height: 1.85;
      color: #51627c;
    }

    .result strong {
      color: #314360;
    }

    @media (max-width: 760px) {
      .container {
        padding-inline: 12px;
      }

      h1 {
        font-size: 1.46rem;
      }

      .options {
        gap: 6px;
      }

      .options label {
        font-size: 0.88rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="content">
      <h1>成人 ADHD 自评量表（ASRS）</h1>
      <div class="desc">
        本工具基于世界卫生组织成人 ADHD 自填量表（ASRS），共 18 道题目。请根据你过去 6 个月的实际感受，选择每题的频率。完成后系统会自动计算分数，并根据评分标准给出参考建议。<br />
        <b>所有信息匿名，不会被存储。</b>
      </div>

      <button class="start-btn" id="startBtn" type="button" onclick="showForm()">开始评测</button>

      <form id="adhd-form" class="form-shell is-hidden">
        <div class="section-title">A部分：注意力不集中（1~9题）</div>
        <div id="questions-a"></div>
        <div class="section-title">B部分：过动/冲动（10~18题）</div>
        <div id="questions-b"></div>
        <button type="button" class="submit-btn" onclick="calculateScore()">提交并查看结果</button>
      </form>

      <div id="result" class="result"></div>
    </div>
  </div>

  <script>
    const questionsA = [
      "1. 当必须进行一件枯燥或困难的计划时，你会多常粗心犯错？",
      "2. 当正在做枯燥或重复性的工作时，你多常有持续专注的困难？",
      "3. 即使有人直接对你说话，你会多常有困难专注于别人跟你讲话的内容？",
      "4. 一旦完成任何计划中最具挑战的部分之后，你多常有完成计划最后细节的困难？",
      "5. 当必须从事需要有组织规划性的任务时，你会多常有困难井然有序地去做？",
      "6. 当有一件需要多费心思考的工作时，你会多常逃避或是延后开始去做？",
      "7. 在家里或是在工作时，你会多常没有把东西放对地方或是找不到东西？",
      "8. 你会多常因身旁的活动或声音而分心？",
      "9. 你会多常有问题去记得约会或是必须要做的事？"
    ];

    const questionsB = [
      "10. 当你必须长时间坐着时，你会多常坐不安稳或扭动手脚？",
      "11. 你会多常在开会时或在其他被期待坐好的场合中离开座位？",
      "12. 你会多常觉得静不下来或烦躁不安？",
      "13. 当有自己独处的时间时，你会多常觉得有困难使自己平静和放松？",
      "14. 你会多常像被马达所驱动一样，觉得自己过度地活跃，不得不做事情？",
      "15. 在社交场合中，你会多常发现自己话讲得太多？",
      "16. 当与他人交谈时，你会多常在别人还没把话讲完前就插嘴或接话替对方把话讲完？",
      "17. 在需要轮流排队的场合时，你会多常有困难轮流等待？",
      "18. 你会多常在别人忙碌时打断别人？"
    ];

    const options = [
      { label: "从不", value: 0 },
      { label: "很少", value: 1 },
      { label: "有时", value: 2 },
      { label: "常常", value: 3 },
      { label: "非常频繁", value: 4 }
    ];

    function getContentHeight() {
      const container = document.querySelector(".container");
      if (!container) {
        return 360;
      }

      const styles = window.getComputedStyle(container);
      const marginTop = parseFloat(styles.marginTop) || 0;
      const marginBottom = parseFloat(styles.marginBottom) || 0;
      const rectHeight = container.getBoundingClientRect().height || 0;
      return Math.ceil(Math.max(container.scrollHeight, container.offsetHeight, rectHeight) + marginTop + marginBottom);
    }

    function syncParentFrame() {
      const frame = window.frameElement;
      const contentHeight = getContentHeight();
      const height = Math.max(contentHeight, 360) + 28;

      if (frame) {
        frame.style.height = `${height}px`;
      }

      try {
        if (window.parent && window.parent.document) {
          const parentFrame = [...window.parent.document.querySelectorAll("iframe.auto-iframe")]
            .find((item) => (item.getAttribute("src") || "").includes("fenshu.html"));
          if (parentFrame) {
            parentFrame.style.height = `${height}px`;
          }
        }
      } catch (error) {
        // ignore parent access issues
      }

      if (window.parent) {
        window.parent.postMessage({
          type: "iframe-height",
          source: "fenshu.html",
          height: height - 28
        }, "*");
      }
    }

    function scrollParentToElement(element) {
      if (!window.parent || !window.frameElement || !element) {
        return;
      }

      const frameRect = window.frameElement.getBoundingClientRect();
      const targetTop = window.parent.scrollY + frameRect.top + element.offsetTop - 28;
      window.parent.scrollTo({
        top: targetTop,
        behavior: "smooth"
      });
    }

    function renderQuestions(containerId, questions, prefix) {
      const container = document.getElementById(containerId);
      container.innerHTML = "";

      questions.forEach((question, index) => {
        const questionIndex = `${prefix}${index + 1}`;
        let html = `<div class="question"><div class="question-title">${question}</div><div class="options">`;

        options.forEach((option) => {
          html += `<label><input type="radio" name="${questionIndex}" value="${option.value}">${option.label}</label>`;
        });

        html += "</div></div>";
        container.innerHTML += html;
      });
    }

    renderQuestions("questions-a", questionsA, "A");
    renderQuestions("questions-b", questionsB, "B");

    function showForm() {
      document.getElementById("startBtn").style.display = "none";
      const form = document.getElementById("adhd-form");
      form.classList.remove("is-hidden");

      window.requestAnimationFrame(() => {
        form.classList.add("is-visible");
        syncParentFrame();
        const firstQuestion = document.querySelector(".question");
        scrollParentToElement(firstQuestion);
        setTimeout(syncParentFrame, 120);
        setTimeout(syncParentFrame, 420);
        setTimeout(syncParentFrame, 900);
        setTimeout(syncParentFrame, 1500);
      });
    }

    function calculateScore() {
      let aScore = 0;
      let bScore = 0;

      for (let index = 1; index <= 9; index += 1) {
        const input = document.querySelector(`input[name="A${index}"]:checked`);
        if (!input) {
          alert("请完成所有题目再提交！");
          return;
        }
        aScore += Number(input.value);
      }

      for (let index = 1; index <= 9; index += 1) {
        const input = document.querySelector(`input[name="B${index}"]:checked`);
        if (!input) {
          alert("请完成所有题目再提交！");
          return;
        }
        bScore += Number(input.value);
      }

      const total = aScore + bScore;

      function getLevel(score) {
        if (score <= 16) {
          return "不太可能";
        }
        if (score <= 23) {
          return "很可能";
        }
        return "非常可能";
      }

      const levelA = getLevel(aScore);
      const levelB = getLevel(bScore);
      const levelT = getLevel(total);
      const levels = [levelA, levelB, levelT];
      let finalLevel = "不太可能";

      if (levels.includes("非常可能")) {
        finalLevel = "非常可能";
      } else if (levels.includes("很可能")) {
        finalLevel = "很可能";
      }

      let message = `<div><strong>您的评分结果：</strong><br>A 部分：${aScore} / 36 （${levelA}）<br>B 部分：${bScore} / 36 （${levelB}）<br>总分：${total} / 72 （${levelT}）</div><br>`;

      if (finalLevel === "不太可能") {
        message += "<div>综合来看，目前量表得分处于较低区间，ADHD 特征不明显。若在日常生活或工作中偶有注意力波动、组织困难等感受，可继续关注自身体验，尝试调整生活方式或行为策略；若长期感到困扰，也可根据需要与专业人士沟通交流。</div>";
      } else if (finalLevel === "很可能") {
        message += "<div>综合来看，量表得分处于中等区间，存在一定与 ADHD 特征相关的表现。您可以在日常中留意这些特征对生活、学习或工作带来的影响，并酌情考虑与专业人士沟通，获取更详细评估或建议；同时，通过合理的自我管理策略、环境调整等方式进行尝试，也有助于改善体验。</div>";
      } else {
        message += "<div>综合来看，量表得分处于较高区间，可能存在明显的 ADHD 特征。建议您考虑积极寻求专业评估与支持，与医生或心理专家沟通，以了解更全面的状况并获得个性化建议或干预方案。同时，也可尝试结合生活习惯、工作/学习环境调整等方式，帮助提升注意力和执行功能。</div>";
      }

      message += "<br><div style='font-style:italic;color:#6a7890;'>* 该量表仅供自我参考，不作最终诊断；若您或他人对结果有疑虑，请以专业评估为准。</div>";

      const resultBox = document.getElementById("result");
      resultBox.innerHTML = message;
      resultBox.style.display = "block";
      syncParentFrame();
      scrollParentToElement(resultBox);
      setTimeout(syncParentFrame, 120);
      setTimeout(syncParentFrame, 420);
      setTimeout(syncParentFrame, 900);
    }

    window.addEventListener("load", () => {
      syncParentFrame();
      const params = new URLSearchParams(window.location.search);
      if (params.get("open") === "1") {
        setTimeout(showForm, 60);
      }
    });
    window.addEventListener("resize", syncParentFrame);

    if ("ResizeObserver" in window) {
      const observer = new ResizeObserver(() => syncParentFrame());
      const container = document.querySelector(".container");
      if (container) {
        observer.observe(container);
      }
    }

    if ("MutationObserver" in window) {
      const observer = new MutationObserver(() => syncParentFrame());
      const content = document.querySelector(".content") || document.body;
      observer.observe(content, {
        childList: true,
        subtree: true,
        attributes: true,
        characterData: true
      });
    }
  </script>
</body>
</html>
