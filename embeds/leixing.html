<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADHD 类型图</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: transparent;
      font-family: "SimHei", "Microsoft YaHei", "PingFang SC", sans-serif;
      color: #39475f;
      padding: 0;
      overflow: visible;
    }

    .adhd-types {
      width: 100%;
      min-height: 780px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: clamp(36px, 7vw, 86px);
      padding: 78px 16px 112px;
      position: relative;
      overflow: visible;
    }

    .adhd-img-wrap {
      width: min(44%, 360px);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 72px;
      padding-bottom: 104px;
      overflow: visible;
    }

    .adhd-img {
      width: min(100%, 260px);
      height: auto;
      display: block;
    }

    .adhd-label {
      margin-top: 10px;
      font-size: 1.12rem;
      color: #45526a;
      letter-spacing: 0.02em;
      text-align: center;
      transition: opacity 0.2s ease;
    }

    .adhd-img-wrap.active .adhd-label {
      opacity: 0;
    }

    .features-cloud {
      pointer-events: none;
      position: absolute;
      left: 50%;
      top: 45%;
      width: 452px;
      height: 404px;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.24s ease;
    }

    .adhd-img-wrap.active .features-cloud {
      opacity: 1;
    }

    .feature-tip {
      position: absolute;
      color: #4f5f78;
      font-size: 0.9rem;
      line-height: 1.5;
      width: 10.2em;
      white-space: normal;
      text-align: center;
    }

    .p1 { left: 50%; top: 3%; transform: translateX(-50%); }
    .p2 { right: -1%; top: 12%; }
    .p3 { right: -6%; top: 35%; }
    .p4 { right: 1%; top: 62%; }
    .p5 { left: 50%; bottom: 2%; transform: translateX(-50%); }
    .p6 { left: 1%; top: 62%; }
    .p7 { left: -6%; top: 22%; }

    .mix-note {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      color: #6b7a91;
      font-size: 0.95rem;
      text-align: center;
      white-space: nowrap;
    }

    @media (max-width: 860px) {
      .adhd-types {
        gap: 24px;
        min-height: 740px;
        padding-top: 68px;
        padding-bottom: 104px;
      }

      .adhd-img-wrap {
        width: 46%;
        padding-top: 62px;
        padding-bottom: 96px;
      }

      .features-cloud {
        width: 364px;
        height: 340px;
      }

      .feature-tip {
        font-size: 0.82rem;
        width: 9.4em;
      }
    }

    @media (max-width: 640px) {
      .adhd-types {
        min-height: 1080px;
        flex-direction: column;
        align-items: center;
        gap: 56px;
        padding-top: 44px;
        padding-bottom: 90px;
      }

      .adhd-img-wrap {
        width: min(100%, 320px);
        padding-top: 56px;
        padding-bottom: 86px;
      }

      .features-cloud {
        width: 308px;
        height: 312px;
        top: 44%;
      }

      .feature-tip {
        font-size: 0.8rem;
        width: 7.8em;
        line-height: 1.42;
      }

      .p1 { top: 2%; }
      .p2 { right: -1%; top: 13%; }
      .p3 { right: -7%; top: 38%; }
      .p4 { right: 1%; top: 63%; }
      .p5 { bottom: 2%; }
      .p6 { left: 1%; top: 63%; }
      .p7 { left: -7%; top: 20%; }

      .mix-note {
        white-space: normal;
        width: min(100%, 18em);
      }
    }
  </style>
</head>
<body>
  <div class="adhd-types">
    <div
      class="adhd-img-wrap"
      id="nobita-wrap"
      onmouseenter="toggleFeatures('nobita', true)"
      onmouseleave="toggleFeatures('nobita', false)"
      ontouchstart="toggleFeatures('nobita', true)">
      <img src="./assets/nobita.png" alt="ADHD注意力不足型" class="adhd-img" />
      <div class="features-cloud" id="features-nobita">
        <div class="feature-tip p1">难以持续完成费心任务</div>
        <div class="feature-tip p2">很难长时间专注在一件事上</div>
        <div class="feature-tip p3">面对需要计划和步骤的任务时更容易卡住</div>
        <div class="feature-tip p4">不容易规划和组织事情</div>
        <div class="feature-tip p5">在日常活动里更容易健忘</div>
        <div class="feature-tip p6">容易忘记物品、约定或手头要做的事</div>
        <div class="feature-tip p7">注意力难以持续，容易分心</div>
      </div>
      <div class="adhd-label">注意力不足为主型</div>
    </div>

    <div
      class="adhd-img-wrap"
      id="fatty-wrap"
      onmouseenter="toggleFeatures('fatty', true)"
      onmouseleave="toggleFeatures('fatty', false)"
      ontouchstart="toggleFeatures('fatty', true)">
      <img src="./assets/fatty.png" alt="ADHD过动型" class="adhd-img" />
      <div class="features-cloud" id="features-fatty">
        <div class="feature-tip p1">难以安静坐着或待着不动</div>
        <div class="feature-tip p2">头脑像停不下来，总在跳来跳去</div>
        <div class="feature-tip p3">容易心烦意乱，坐立不安</div>
        <div class="feature-tip p4">说话偏快，也更容易打断别人</div>
        <div class="feature-tip p5">情绪上来得快，也更难一下收住</div>
        <div class="feature-tip p6">等待和排队时更容易不耐烦</div>
        <div class="feature-tip p7">做决定偏快，不太来得及多想一步</div>
      </div>
      <div class="adhd-label">过动为主型</div>
    </div>

    <div class="mix-note">混合型：同时表现出上述两类特征，是成人中最常见的一型。</div>
  </div>

  <script>
    function toggleFeatures(type, show) {
      const target = document.getElementById(`${type}-wrap`);
      if (!target) {
        return;
      }

      document.querySelectorAll(".adhd-img-wrap").forEach((item) => {
        if (item !== target) {
          item.classList.remove("active");
        }
      });

      target.classList.toggle("active", show);
    }

    document.addEventListener("touchstart", (event) => {
      const wrap = event.target.closest(".adhd-img-wrap");
      if (wrap) {
        return;
      }
      document.querySelectorAll(".adhd-img-wrap").forEach((item) => item.classList.remove("active"));
    }, { passive: true });
  </script>
</body>
</html>
