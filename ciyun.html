<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADHD 患者心声词云</title>
  <style>
    :root {
      --ink: #314360;
      --muted: #6c7a91;
      --purple: #cab1ec;
      --purple-deep: #8f7bc4;
      --blue: #92b9ef;
      --blue-soft: #dfeeff;
      --slate: #95a5cf;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: transparent;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--ink);
      padding: 10px 0 0;
    }

    .cloud-scene {
      position: relative;
      width: 100%;
      min-height: 520px;
      overflow: hidden;
      isolation: isolate;
    }

    .cloud-scene::before {
      content: "";
      position: absolute;
      inset: 8% 10% 10%;
      background:
        radial-gradient(circle at 50% 48%, rgba(232, 211, 255, 0.42), transparent 38%),
        radial-gradient(circle at 30% 56%, rgba(222, 236, 255, 0.34), transparent 32%),
        radial-gradient(circle at 74% 38%, rgba(222, 236, 255, 0.26), transparent 28%);
      filter: blur(20px);
      opacity: 0.92;
    }

    .cloud-scene::after {
      content: "";
      position: absolute;
      inset: 15% 18%;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.42), transparent 44%),
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.22), transparent 62%);
      filter: blur(12px);
      opacity: 0.65;
    }

    .field {
      position: relative;
      min-height: 520px;
      width: 100%;
    }

    .word {
      position: absolute;
      left: calc(var(--x) * 1%);
      top: calc(var(--y) * 1%);
      z-index: 1;
      color: var(--word-color);
      font-size: calc(0.76rem + var(--scale) * 0.92rem);
      font-weight: calc(420 + var(--weight) * 11);
      letter-spacing: 0.02em;
      line-height: 1;
      white-space: nowrap;
      text-shadow: 0 0 16px rgba(248, 251, 255, 0.78);
      transform: translate(-50%, -50%) rotate(var(--rotate)) scale(0.86);
      opacity: 0;
      filter: blur(12px);
      transition:
        opacity 0.9s ease,
        filter 0.9s ease,
        transform 1s cubic-bezier(0.2, 0.72, 0.2, 1);
      animation: drift var(--duration) ease-in-out var(--delay) infinite;
      animation-play-state: paused;
    }

    .word.major {
      color: var(--purple-deep);
      font-size: calc(1.04rem + var(--scale) * 1.02rem);
      font-weight: 700;
    }

    body.is-ready .word {
      opacity: 1;
      filter: blur(0);
      transform: translate(-50%, -50%) rotate(var(--rotate)) scale(1);
      animation-play-state: running;
    }

    @keyframes drift {
      0%,
      100% {
        translate: 0 0;
      }
      50% {
        translate: 0 -7px;
      }
    }

    @media (max-width: 760px) {
      .cloud-scene,
      .field {
        min-height: 460px;
      }

      .word {
        font-size: calc(0.7rem + var(--scale) * 0.76rem);
      }

      .word.major {
        font-size: calc(0.94rem + var(--scale) * 0.88rem);
      }
    }
  </style>
</head>
<body>
  <div class="cloud-scene">
    <div id="field" class="field"></div>
  </div>

  <script>
    const words = [
      { label: "启动困难", value: 19, x: 50, y: 48, r: "-5deg" },
      { label: "控制不住", value: 15, x: 35, y: 41, r: "-6deg" },
      { label: "焦虑抑郁", value: 14, x: 64, y: 40, r: "4deg" },
      { label: "时间管理", value: 15, x: 41, y: 61, r: "3deg" },
      { label: "医院确诊", value: 16, x: 56, y: 28, r: "0deg" },
      { label: "工作学习", value: 13, x: 67, y: 58, r: "-3deg" },
      { label: "三分钟热度", value: 13, x: 26, y: 55, r: "5deg" },
      { label: "影响生活", value: 10, x: 76, y: 48, r: "-4deg" },
      { label: "药物治疗", value: 11, x: 54, y: 69, r: "2deg" },
      { label: "注意力涣散", value: 10, x: 24, y: 33, r: "-5deg" },
      { label: "情绪波动", value: 7, x: 74, y: 66, r: "7deg" },
      { label: "成绩不错", value: 10, x: 44, y: 19, r: "-2deg" },
      { label: "社交障碍", value: 9, x: 18, y: 47, r: "6deg" },
      { label: "注意力分散", value: 8, x: 82, y: 35, r: "-7deg" },
      { label: "学习效率", value: 6, x: 58, y: 82, r: "4deg" },
      { label: "学习困难", value: 6, x: 29, y: 74, r: "-4deg" },
      { label: "思维跳跃", value: 6, x: 72, y: 21, r: "5deg" },
      { label: "忘记吃药", value: 5, x: 86, y: 56, r: "-4deg" },
      { label: "工作生活", value: 6, x: 13, y: 61, r: "2deg" },
      { label: "多动冲动", value: 5, x: 61, y: 12, r: "-3deg" },
      { label: "医院检查", value: 5, x: 15, y: 29, r: "4deg" },
      { label: "负面情绪", value: 8, x: 84, y: 73, r: "-5deg" },
      { label: "注意力很难", value: 6, x: 10, y: 41, r: "5deg" },
      { label: "阅读困难", value: 5, x: 35, y: 83, r: "-3deg" },
      { label: "思维发散", value: 5, x: 68, y: 78, r: "4deg" },
      { label: "医生诊断", value: 8, x: 84, y: 24, r: "-4deg" },
      { label: "养成习惯", value: 8, x: 22, y: 20, r: "5deg" },
      { label: "工作时间", value: 6, x: 51, y: 92, r: "0deg" },
      { label: "社会功能", value: 7, x: 6, y: 53, r: "-2deg" },
      { label: "晚上睡不着", value: 7, x: 92, y: 44, r: "3deg" }
    ];

    const palette = ["var(--purple)", "var(--blue)", "var(--slate)", "var(--purple-deep)", "#8ea1d1"];
    const maxValue = Math.max(...words.map((item) => item.value));
    const field = document.getElementById("field");

    words.forEach((item, index) => {
      const el = document.createElement("span");
      el.className = "word";
      if (index < 10) {
        el.classList.add("major");
      }
      el.textContent = item.label;
      el.style.setProperty("--x", item.x);
      el.style.setProperty("--y", item.y);
      el.style.setProperty("--rotate", item.r);
      el.style.setProperty("--scale", (item.value / maxValue).toFixed(2));
      el.style.setProperty("--weight", String(item.value));
      el.style.setProperty("--word-color", palette[index % palette.length]);
      el.style.setProperty("--delay", `${(index % 7) * 0.18}s`);
      el.style.setProperty("--duration", `${7 + (index % 5)}s`);
      field.appendChild(el);
    });

    window.requestAnimationFrame(() => {
      document.body.classList.add("is-ready");
    });
  </script>
</body>
</html>
