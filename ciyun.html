<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADHD 患者心声词云</title>
  <style>
    :root {
      --ink: #314360;
      --muted: #6c7a91;
      --purple: #cab1ec;
      --blue: #92b9ef;
      --slate: #95a5cf;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: transparent;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      padding: 12px 4px 0;
      color: var(--ink);
    }

    .cloud-wrap {
      width: 100%;
    }

    .wordcloud {
      position: relative;
      min-height: 470px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-content: center;
      gap: 10px 16px;
      padding: 30px 26px 24px;
      overflow: visible;
    }

    .wordcloud::before {
      content: "";
      position: absolute;
      inset: 10% 10% 8%;
      background:
        radial-gradient(circle at 40% 46%, rgba(232, 211, 255, 0.34), transparent 44%),
        radial-gradient(circle at 58% 54%, rgba(222, 236, 255, 0.34), transparent 46%);
      filter: blur(8px);
      pointer-events: none;
    }

    .word {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 7px;
      line-height: 1;
      white-space: nowrap;
      color: var(--word-color);
      font-size: calc(0.82rem + var(--scale) * 0.3rem);
      font-weight: calc(420 + var(--weight) * 14);
      transform: translate(var(--tx), var(--ty)) rotate(var(--rotate));
      opacity: 0.95;
    }

    .word.is-major {
      font-size: calc(1.04rem + var(--scale) * 0.32rem);
      color: #2f4160;
    }

    @media (max-width: 720px) {
      .wordcloud {
        min-height: 400px;
        padding: 18px 12px 16px;
        gap: 8px 12px;
      }

      .word {
        transform: translate(calc(var(--tx) * 0.5), calc(var(--ty) * 0.5)) rotate(var(--rotate));
      }
    }
  </style>
</head>
<body>
  <div class="cloud-wrap">
    <div id="wordcloud" class="wordcloud"></div>
  </div>

  <script>
    const words = [
      ["注意力缺陷", 23], ["启动困难", 19], ["医院确诊", 16], ["控制不住", 15], ["时间管理", 15],
      ["焦虑抑郁", 14], ["诊断标准", 14], ["工作学习", 13], ["三分钟热度", 13], ["缺陷多动", 11],
      ["药物治疗", 11], ["注意力涣散", 10], ["成绩不错", 10], ["影响生活", 10], ["社交障碍", 9],
      ["抑郁焦虑", 9], ["考上大学", 8], ["医生诊断", 8], ["注意力分散", 8], ["养成习惯", 8],
      ["负面情绪", 8], ["小学初中", 8], ["两个小时", 7], ["多动症患者", 7], ["晚上睡不着", 7],
      ["社会功能", 7], ["情绪波动", 7], ["高中成绩", 7], ["工作时间", 6], ["初中高中", 6],
      ["注意力很难", 6], ["工作生活", 6], ["学习效率", 6], ["学习困难", 6], ["智力测试", 6],
      ["思维跳跃", 6], ["倒数第一", 6], ["意识不到", 6], ["药物作用", 6], ["脾气暴躁", 6],
      ["阅读困难", 5], ["思维发散", 5], ["忘记吃药", 5], ["朋友相处", 5], ["医院检查", 5],
      ["情绪失控", 5], ["多动冲动", 5], ["成长过程", 5]
    ];

    const shifts = [
      ["-16px", "-10px", "-10deg"], ["8px", "-12px", "6deg"], ["-10px", "8px", "4deg"], ["14px", "10px", "-8deg"],
      ["-8px", "14px", "0deg"], ["12px", "-6px", "8deg"], ["-14px", "4px", "-6deg"], ["6px", "12px", "-4deg"],
      ["-6px", "-8px", "5deg"], ["10px", "0px", "-5deg"]
    ];

    const colors = ["var(--purple)", "var(--blue)", "var(--slate)", "#8ea1d1"];
    const maxValue = Math.max(...words.map((item) => item[1]));
    const container = document.getElementById("wordcloud");

    words.forEach(([label, value], index) => {
      const item = document.createElement("span");
      const [tx, ty, rotate] = shifts[index % shifts.length];
      item.className = "word";
      if (index < 12) {
        item.classList.add("is-major");
      }
      item.textContent = label;
      item.style.setProperty("--scale", (value / maxValue).toFixed(2));
      item.style.setProperty("--weight", String(value));
      item.style.setProperty("--tx", tx);
      item.style.setProperty("--ty", ty);
      item.style.setProperty("--rotate", rotate);
      item.style.setProperty("--word-color", colors[index % colors.length]);
      container.appendChild(item);
    });
  </script>
</body>
</html>
