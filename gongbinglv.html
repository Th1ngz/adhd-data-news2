<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成人ADHD共病率可视化</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    /* ==== 全局 ==== */
    body{
        background-color:transparent;
        margin:0;
        padding:0;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:auto;
        font-family:"Microsoft YaHei","微软雅黑",'黑体',sans-serif; /* 黑体家族 */
        color:#222;                                             /* 字体默认黑色 */
        font-size:17px;                                         /* 全局字号上调 */
    }

    /* ==== 容器 ==== */
    .chart-container{
        width:100%;
        max-width:900px;
        background-color:transparent;
        border-radius:0;
        padding:12px 8px 0;
        box-shadow:none;
    }

    .chart-title{
        display:none;
    }

    canvas{
        width:100%!important;
        height:440px!important;
    }

    .legend,
    .chart-footer{
        display:none;
    }
    
</style>
</head>
<body>
<div class="chart-container">
    <canvas id="comorbidityChart"></canvas>
</div>

<script>
document.addEventListener('DOMContentLoaded',()=>{
    /* 数据 */
    const disorders=['抑郁症','抑郁障碍','焦虑障碍','双相障碍',
                     '人格障碍','物质使用障碍','睡眠障碍','肥胖问题','超重'];

    const rates=['18.6','45.76','23.8~47.1','7.95~19.4',
                 '10~75','2.43~35.12','13.43','19.3','31.2'];

    /* 处理范围 */
    const processed=rates.map(r=>{
        if(r.includes('~')){
            const [min,max]=r.split('~').map(Number);
            return {min,max,avg:(min+max)/2,range:true};
        }
        const val=parseFloat(r);
        return {min:val,max:val,avg:val,range:false};
    });

    /* 图表 */
    const ctx=document.getElementById('comorbidityChart').getContext('2d');
    new Chart(ctx,{
        type:'bar',
        data:{
            labels:disorders,
            datasets:[{
                label:'平均共病率 (%)',
                data:processed.map(r=>r.avg),
                backgroundColor:processed.map(r=>r.range?'rgba(232,211,255,.92)':'rgba(222,236,255,.95)'),
                borderColor:'transparent',
                borderWidth:0,
                errorBars:disorders.reduce((o,name,i)=>{
                    const r=processed[i];
                    if(r.range){
                        o[name]={min:r.avg-r.min,max:r.max-r.avg,color:'#6c6c6c',width:8,lineWidth:2};
                    }
                    return o;
                },{})
            }]
        },
        options: {
    indexAxis: 'y',
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
        legend: { display: false },
        tooltip: {
            backgroundColor: 'rgba(255,255,255,.96)',
            borderColor: '#d9e3f0',
            borderWidth: 1,
            titleColor: '#222',
            bodyColor: '#222',
            titleFont: { family:'Microsoft YaHei', size:16, weight:'600' },
            bodyFont:  { family:'Microsoft YaHei', size:15 },
            callbacks: {
                title: items => items[0].label,
                label: ctx => {
                    const r = processed[ctx.dataIndex];
                    return r.range
                      ? `范围：${r.min}% – ${r.max}% | 平均：${r.avg.toFixed(2)}%`
                      : `共病率：${r.avg.toFixed(2)}%`;
                }
            }
        }
    },
            scales: {
                x: {
                    beginAtZero: true,
                    title: {
                        display: true,
                        text: '共病率 (%)',
                        color: '#222',                 // ← ① 轴标题颜色
                        font: {
                            family: 'Microsoft YaHei',
                            size: 16,
                            weight: '400'
                        }
                    },
                    ticks: {
                        color: '#222',                 // ← ③ 横轴刻度颜色
                        font: {
                            size: 14,
                            family: 'Microsoft YaHei'
                        },
                        callback: v => v + '%'
                    },
                    max: 85,
                    grid: {
                        color: 'rgba(117,137,170,.12)'
                    }
                },
                y: {
                    grid: { display: false },
                    ticks: {
                        color: '#222',                 // ← ② 纵轴文字颜色
                        font: {
                            family: 'Microsoft YaHei',
                            size: 16,                  // 字号加大
                            weight: '400'              // 加粗，避免“扁细”
                        }
                    }
                }
            },
            animation: { duration: 1500, easing: 'easeOutQuart' }
        }
    });
});
</script>
</body>
</html>
