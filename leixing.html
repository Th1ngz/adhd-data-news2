<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADHD 类型视觉介绍</title>
  <style>
    :root {
      --ink: #314360;
      --muted: #6b7a91;
      --purple: rgba(232, 211, 255, 0.86);
      --blue: rgba(222, 236, 255, 0.9);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: transparent;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--ink);
    }

    .type-stage {
      position: relative;
      width: 100%;
      min-height: 700px;
      padding: 26px 6px 38px;
      display: grid;
      gap: 18px;
      isolation: isolate;
    }

    .type-stage::before {
      content: "";
      position: absolute;
      inset: 10% 6% 14%;
      background:
        radial-gradient(circle at 28% 46%, rgba(222, 236, 255, 0.34), transparent 26%),
        radial-gradient(circle at 72% 44%, rgba(232, 211, 255, 0.34), transparent 26%),
        radial-gradient(circle at 50% 64%, rgba(255, 255, 255, 0.28), transparent 34%);
      filter: blur(28px);
      opacity: 0.92;
      pointer-events: none;
    }

    .type-grid {
      position: relative;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: clamp(22px, 4vw, 42px);
      align-items: start;
    }

    .type-card {
      position: relative;
      min-height: 560px;
      padding: 18px 12px 20px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.28), rgba(255, 255, 255, 0.14));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.26);
    }

    .type-card::before {
      content: "";
      position: absolute;
      inset: 14% 12% 18%;
      background:
        radial-gradient(circle at 50% 48%, var(--halo), transparent 58%);
      filter: blur(18px);
      opacity: 0.88;
      z-index: -1;
    }

    .type-card[data-type="nobita"] {
      --halo: rgba(222, 236, 255, 0.58);
    }

    .type-card[data-type="fatty"] {
      --halo: rgba(232, 211, 255, 0.58);
    }

    .type-title {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 0.96rem;
      color: #33445f;
      background: linear-gradient(90deg, rgba(222, 236, 255, 0.94), rgba(232, 211, 255, 0.84));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.48);
    }

    .type-figure {
      position: relative;
      min-height: 474px;
      display: grid;
      place-items: center;
    }

    .type-figure img {
      width: min(100%, 238px);
      filter: drop-shadow(0 18px 24px rgba(104, 121, 151, 0.1));
    }

    .bubble {
      position: absolute;
      max-width: 8.8em;
      padding: 8px 12px;
      border-radius: 999px;
      color: #53637b;
      font-size: 0.9rem;
      line-height: 1.45;
      text-align: center;
      background: rgba(255, 255, 255, 0.58);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.56);
      backdrop-filter: blur(8px);
    }

    .n1 { left: 6%; top: 12%; }
    .n2 { right: 5%; top: 15%; }
    .n3 { left: 0; top: 46%; }
    .n4 { right: 0; top: 49%; }
    .n5 { left: 50%; bottom: 5%; transform: translateX(-50%); }

    .f1 { left: 6%; top: 14%; }
    .f2 { right: 6%; top: 12%; }
    .f3 { left: 0; top: 47%; }
    .f4 { right: 0; top: 48%; }
    .f5 { left: 50%; bottom: 5%; transform: translateX(-50%); }

    .type-desc {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.7;
      margin-top: 10px;
      text-align: center;
    }

    .mix-note {
      position: relative;
      width: min(100%, 560px);
      margin: 0 auto;
      padding: 10px 18px;
      border-radius: 999px;
      text-align: center;
      color: #566782;
      font-size: 0.92rem;
      background: rgba(255, 255, 255, 0.52);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.48);
    }

    @media (max-width: 860px) {
      .type-grid {
        grid-template-columns: 1fr;
      }

      .type-card {
        min-height: 500px;
      }

      .type-figure {
        min-height: 430px;
      }
    }

    @media (max-width: 540px) {
      .type-stage {
        padding-inline: 0;
      }

      .type-card {
        padding-inline: 6px;
      }

      .type-figure img {
        width: min(100%, 188px);
      }

      .bubble {
        max-width: 7.6em;
        font-size: 0.82rem;
        padding: 7px 10px;
      }

      .n1, .f1 { left: 2%; }
      .n2, .f2 { right: 2%; }
      .n3, .f3 { left: 1%; }
      .n4, .f4 { right: 1%; }
    }
  </style>
</head>
<body>
  <div class="type-stage">
    <div class="type-grid">
      <article class="type-card" data-type="nobita">
        <div class="type-title">注意力不足为主型</div>
        <div class="type-figure">
          <img src="nobita.png" alt="ADHD 注意力不足为主型" />
          <div class="bubble n1">拖延启动困难</div>
          <div class="bubble n2">容易分心走神</div>
          <div class="bubble n3">时间感混乱</div>
          <div class="bubble n4">常常丢三落四</div>
          <div class="bubble n5">任务收尾困难</div>
        </div>
        <p class="type-desc">外表不一定吵闹，但执行、整理和持续专注往往更吃力。</p>
      </article>

      <article class="type-card" data-type="fatty">
        <div class="type-title">过动 / 冲动为主型</div>
        <div class="type-figure">
          <img src="fatty.png" alt="ADHD 过动冲动为主型" />
          <div class="bubble f1">坐不住、停不下</div>
          <div class="bubble f2">说话容易打断别人</div>
          <div class="bubble f3">做事更冲动</div>
          <div class="bubble f4">情绪反应更外显</div>
          <div class="bubble f5">等待和克制更困难</div>
        </div>
        <p class="type-desc">问题更容易在语言、动作和情绪上直接暴露出来。</p>
      </article>
    </div>

    <div class="mix-note">更多成年人会同时带有两类特征，只是在不同场景里表现轻重不同。</div>
  </div>
</body>
</html>
