<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADHD 类型图</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: transparent;
      font-family: "SimHei", "Microsoft YaHei", "PingFang SC", sans-serif;
      color: #39475f;
      padding: 0;
    }

    .adhd-types {
      width: 100%;
      min-height: 640px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: clamp(36px, 7vw, 86px);
      padding: 12px 12px 22px;
      position: relative;
    }

    .adhd-img-wrap {
      width: min(44%, 360px);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    .adhd-img {
      width: min(100%, 260px);
      height: auto;
      display: block;
    }

    .adhd-label {
      margin-top: 10px;
      font-size: 1.12rem;
      color: #45526a;
      letter-spacing: 0.02em;
      text-align: center;
    }

    .features-cloud {
      pointer-events: none;
      position: absolute;
      left: 50%;
      top: 48%;
      width: 400px;
      height: 400px;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.24s ease;
    }

    .adhd-img-wrap.active .features-cloud {
      opacity: 1;
    }

    .feature-tip {
      position: absolute;
      color: #4f5f78;
      font-size: 0.95rem;
      line-height: 1.45;
      white-space: nowrap;
      text-align: center;
    }

    .p1 { left: 50%; top: -6%; transform: translateX(-50%); }
    .p2 { right: -4%; top: 16%; }
    .p3 { right: -10%; top: 38%; }
    .p4 { right: -6%; top: 70%; }
    .p5 { left: 50%; bottom: -5%; transform: translateX(-50%); }
    .p6 { left: -7%; top: 70%; }
    .p7 { left: -12%; top: 38%; }
    .p8 { left: -5%; top: 16%; }

    .mix-note {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      color: #6b7a91;
      font-size: 0.95rem;
      text-align: center;
      white-space: nowrap;
    }

    @media (max-width: 860px) {
      .adhd-types {
        gap: 24px;
      }

      .adhd-img-wrap {
        width: 46%;
      }

      .features-cloud {
        width: 320px;
        height: 320px;
      }

      .feature-tip {
        font-size: 0.88rem;
      }
    }

    @media (max-width: 640px) {
      .adhd-types {
        min-height: 940px;
        flex-direction: column;
        align-items: center;
        gap: 40px;
        padding-bottom: 42px;
      }

      .adhd-img-wrap {
        width: min(100%, 320px);
      }

      .features-cloud {
        width: 300px;
        height: 300px;
      }

      .feature-tip {
        font-size: 0.84rem;
        white-space: normal;
        width: 7.4em;
      }

      .p1 { top: -8%; }
      .p2 { right: -7%; top: 18%; }
      .p3 { right: -10%; top: 40%; }
      .p4 { right: -6%; top: 73%; }
      .p5 { bottom: -8%; }
      .p6 { left: -6%; top: 73%; }
      .p7 { left: -10%; top: 40%; }
      .p8 { left: -7%; top: 18%; }

      .mix-note {
        white-space: normal;
        width: min(100%, 18em);
      }
    }
  </style>
</head>
<body>
  <div class="adhd-types">
    <div
      class="adhd-img-wrap"
      id="nobita-wrap"
      onmouseenter="toggleFeatures('nobita', true)"
      onmouseleave="toggleFeatures('nobita', false)"
      ontouchstart="toggleFeatures('nobita', true)">
      <img src="nobita.png" alt="ADHD注意力不足型" class="adhd-img" />
      <div class="features-cloud" id="features-nobita">
        <div class="feature-tip p1">很难注意事情的细节</div>
        <div class="feature-tip p2">不容易专注在一件事情上</div>
        <div class="feature-tip p3">不容易针对事物或活动规划组织</div>
        <div class="feature-tip p4">会遗忘一些需要的物品</div>
        <div class="feature-tip p5">在日常活动中比较健忘</div>
        <div class="feature-tip p6">注意力持续短，易分心</div>
        <div class="feature-tip p7">不易处理结构性作业</div>
        <div class="feature-tip p8">难以完成繁琐或需耐心的任务</div>
      </div>
      <div class="adhd-label">注意力不足为主型</div>
    </div>

    <div
      class="adhd-img-wrap"
      id="fatty-wrap"
      onmouseenter="toggleFeatures('fatty', true)"
      onmouseleave="toggleFeatures('fatty', false)"
      ontouchstart="toggleFeatures('fatty', true)">
      <img src="fatty.png" alt="ADHD过动型" class="adhd-img" />
      <div class="features-cloud" id="features-fatty">
        <div class="feature-tip p1">没办法好好坐着</div>
        <div class="feature-tip p2">在座位上坐立不安、动来动去</div>
        <div class="feature-tip p3">会在不适当的时间点离开座位</div>
        <div class="feature-tip p4">从事具风险性的事，不考虑后果</div>
        <div class="feature-tip p5">时常活跃、精力充沛停不下来</div>
        <div class="feature-tip p6">说话频率和时间比其他人多</div>
        <div class="feature-tip p7">问题未说完就抢着说答案</div>
        <div class="feature-tip p8">不易轮流等候，常常插嘴或打断别人</div>
      </div>
      <div class="adhd-label">过动为主型</div>
    </div>

    <div class="mix-note">混合型：同时表现出上述两类特征，是成人中最常见的一型。</div>
  </div>

  <script>
    function toggleFeatures(type, show) {
      const target = document.getElementById(`${type}-wrap`);
      if (!target) {
        return;
      }

      document.querySelectorAll(".adhd-img-wrap").forEach((item) => {
        if (item !== target) {
          item.classList.remove("active");
        }
      });

      target.classList.toggle("active", show);
    }

    document.addEventListener("touchstart", (event) => {
      const wrap = event.target.closest(".adhd-img-wrap");
      if (wrap) {
        return;
      }
      document.querySelectorAll(".adhd-img-wrap").forEach((item) => item.classList.remove("active"));
    }, { passive: true });
  </script>
</body>
</html>
